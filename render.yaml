services:
  - type: web
    name: bubblewire
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "npm start"
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 22
      - key: DEMO_MODE
        value: off
      - key: TWITCH_CHANNELS
        value: fazebanks,marketbubble,xqc
      - key: PORT
        sync: false
