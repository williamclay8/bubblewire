services:
  - type: web
    name: bubblewire
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "npm start"
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 22
      - key: DEMO_MODE
        value: off
      - key: X_STREAM_ENABLED
        value: "on"
      - key: X_AUTO_TERMINATE_CONNECTIONS
        value: "on"
      - key: X_AUTO_TERMINATE_RECONNECT_MS
        value: "2000"
      - key: ADMIN_TOKEN
        sync: false
      - key: TWITCH_CHANNELS
        value: fazebanks,marketbubble,xqc
      - key: KICK_WEBHOOK_PUBLIC_URL
        value: https://bubblewire-challenge.onrender.com
      - key: KICK_AUTO_SUBSCRIBE
        value: "0"
      - key: KICK_ACCESS_TOKEN
        sync: false
      - key: KICK_BROADCASTER_USER_ID
        sync: false
      - key: KICK_REQUIRE_SIGNATURE
        value: "0"
      - key: PORT
        sync: false
